<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Find a Rescue — Second Tail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange:  #D76B1A;
      --bark:    #5A4A42;
      --dark:    #2E2E2E;
      --cream:   #FBF8F4;
      --warm:    #FDF6EC;
      --amber:   #F7E2BD;
      --visited: #EBBF7A;
      --border:  rgba(90,74,66,0.12);
    }
    html, body, #root {
      height: 100%; background: var(--warm);
      font-family: 'Geist', system-ui, sans-serif;
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100dvh; position: relative; user-select: none; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 24px; z-index: 10;
      background: var(--warm); border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .header-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .header-logo img { height: 22px; }
    .header-tagline { font-family: 'Lora', serif; font-size: 12px; color: var(--bark); font-style: italic; opacity: 0.65; }

    /* Gamification counter */
    .header-score {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--bark); opacity: 0.75; flex: 1; justify-content: center;
    }
    .score-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--amber); border-radius: 999px;
      padding: 3px 10px; font-size: 12px; font-weight: 500; color: var(--bark);
      transition: transform .2s, background .3s;
    }
    .score-pill.bump { animation: scoreBump .35s ease; }
    @keyframes scoreBump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); background: #f0c878; } }

    .header-link {
      font-size: 12px; color: var(--orange); text-decoration: none; font-weight: 500;
      border: 1px solid var(--orange); padding: 5px 12px; border-radius: 999px;
      transition: all .18s; white-space: nowrap; flex-shrink: 0;
    }
    .header-link:hover { background: var(--orange); color: white; }

    /* ── Map ── */
    .map-wrapper { flex: 1; position: relative; overflow: hidden; touch-action: none; }
    .map-svg-container { width: 100%; height: 100%; }
    .map-svg-container svg {
      width: 100%; height: 100%; display: block;
      transition: transform 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* ── New-state toast ── */
    .new-state-toast {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: var(--orange); color: white;
      font-family: 'Lora', serif; font-size: 14px; font-weight: 600;
      padding: 7px 18px; border-radius: 999px;
      z-index: 20; white-space: nowrap;
      animation: toastIn .3s cubic-bezier(0.34,1.4,0.64,1) forwards,
                 toastOut .4s ease .5s forwards;
      pointer-events: none;
    }
    @keyframes toastIn  { from { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(-6px); } }

    /* ── Draggable item ── */
    .throw-item {
      position: fixed; pointer-events: none;
      z-index: 50; transform-origin: center center;
      filter: drop-shadow(0 6px 16px rgba(90,74,66,0.35));
      transition: filter .15s;
      touch-action: none;
    }
    .throw-item.resting {
      pointer-events: all;
      cursor: grab;
      filter: drop-shadow(0 3px 8px rgba(90,74,66,0.22));
      transition: filter .15s, transform .15s;
    }
    .throw-item.resting:hover { filter: drop-shadow(0 6px 14px rgba(215,107,26,0.4)); transform: translate(-50%,-50%) scale(1.12) !important; }
    .throw-item.dragging { cursor: grabbing; }

    /* ── Bottom UI ── */
    .bottom-ui {
      flex-shrink: 0; z-index: 10;
      background: var(--warm); border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .bottom-prompt { font-family: 'Lora', serif; font-size: 15px; color: var(--dark); flex: 1; line-height: 1.35; }
    .bottom-prompt em { font-style: italic; color: var(--bark); }
    .bottom-prompt small { display: block; font-size: 11px; color: var(--bark); opacity: .5; font-style: normal; margin-top: 2px; }
    .pet-selector { display: flex; gap: 6px; }
    .pet-btn {
      padding: 7px 13px; border-radius: 999px; border: 1.5px solid var(--border);
      background: white; font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      color: var(--bark); cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .pet-btn:hover { border-color: var(--orange); color: var(--orange); }
    .pet-btn.active { background: var(--orange); border-color: var(--orange); color: white; }
    .pet-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Map intro ── */
    .map-intro {
      position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none; z-index: 5;
      animation: floatIntro 4s ease-in-out infinite;
    }
    @keyframes floatIntro {
      0%,100% { transform: translate(-50%,-50%); }
      50%      { transform: translate(-50%, calc(-50% - 7px)); }
    }
    .map-intro h1 { font-family: 'Lora', serif; font-size: clamp(18px, 3vw, 32px); color: var(--bark); font-weight: 700; line-height: 1.2; }
    .map-intro p  { font-size: 13px; color: var(--bark); opacity: .6; margin-top: 6px; }

    /* ── Ripple ── */
    .ripple-ring { pointer-events: none; }

    /* ── Loading ── */
    .loading-overlay {
      position: absolute; inset: 0; background: rgba(253,246,236,.72);
      backdrop-filter: blur(3px); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 30; gap: 12px;
    }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--amber); border-top-color: var(--orange); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Lora', serif; font-size: 15px; color: var(--bark); font-style: italic; }

    /* ── Result overlay ── */
    .result-overlay {
      position: absolute; inset: 0;
      background: rgba(30,22,18,.5); backdrop-filter: blur(4px);
      z-index: 40; display: flex; align-items: center; justify-content: center; padding: 20px;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Result card ── */
    .result-card {
      background: white; border-radius: 22px;
      max-width: 460px; width: 100%; overflow: hidden;
      box-shadow: 0 28px 70px rgba(0,0,0,.24);
      animation: cardUp .5s cubic-bezier(0.34,1.4,0.64,1);
    }
    @keyframes cardUp { from { transform: translateY(50px); opacity: 0; } to { transform: none; opacity: 1; } }

    .animal-photo {
      position: relative; height: 240px; overflow: hidden; background: var(--amber);
      display: flex; align-items: center; justify-content: center;
    }
    .animal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .animal-photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(20,12,8,.72) 0%, rgba(20,12,8,.1) 50%, transparent 100%);
    }
    .animal-photo-name {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 18px 12px;
      color: white;
    }
    .animal-photo-name h2 { font-family: 'Lora', serif; font-size: 28px; font-weight: 700; line-height: 1; }
    .animal-photo-name .meta { font-size: 12px; opacity: .8; margin-top: 3px; }
    .status-pill {
      position: absolute; top: 12px; right: 12px;
      padding: 4px 11px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .02em;
    }
    .status-foster { background: #FEF3C7; color: #8a4000; }
    .photo-placeholder { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

    /* Rescue strip */
    .rescue-strip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px; background: var(--warm); border-bottom: 1px solid var(--border);
    }
    .rescue-info { display: flex; flex-direction: column; gap: 1px; }
    .rescue-name { font-size: 13px; font-weight: 600; color: var(--dark); }
    .rescue-loc  { font-size: 11px; color: var(--bark); opacity: .65; }
    .rescue-link {
      font-size: 12px; color: var(--orange); font-weight: 500;
      text-decoration: none; border: 1px solid rgba(215,107,26,.3);
      padding: 4px 11px; border-radius: 999px; transition: all .18s; white-space: nowrap;
    }
    .rescue-link:hover { background: var(--orange); color: white; }

    /* Card body */
    .card-body { padding: 14px 18px 16px; }
    .animal-story { font-size: 14px; line-height: 1.7; color: var(--dark); text-wrap: pretty; }

    /* Primary CTA — foster signup */
    .btn-foster {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; margin-top: 14px; padding: 13px 16px; border-radius: 999px;
      background: var(--orange); color: white; border: none;
      font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: opacity .18s, transform .18s;
    }
    .btn-foster:hover { opacity: .88; transform: translateY(-1px); }

    /* Secondary — visit rescue */
    .btn-rescue {
      display: flex; align-items: center; justify-content: center;
      width: 100%; margin-top: 8px; padding: 11px 16px; border-radius: 999px;
      background: white; color: var(--bark);
      border: 1.5px solid var(--border);
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: border-color .18s, color .18s;
    }
    .btn-rescue:hover { border-color: var(--bark); color: var(--dark); }

    .card-footer {
      border-top: 1px solid var(--border); padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .again-btn {
      background: none; border: none; font-family: 'Geist', sans-serif;
      font-size: 13px; color: var(--orange); cursor: pointer; font-weight: 500;
    }
    .again-btn:hover { text-decoration: underline; }
    .footer-brand { font-size: 11px; color: var(--bark); opacity: .4; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .header { padding: 8px 14px; }
      .header-tagline { display: none; }
      .header-score { font-size: 11px; }
      .bottom-ui { flex-wrap: wrap; padding: 8px 12px 12px; gap: 6px; }
      .bottom-prompt { width: 100%; flex: none; font-size: 13px; }
      .pet-selector { flex: 1; }
      .pet-btn { padding: 6px 10px; font-size: 12px; }

      .result-overlay { align-items: flex-end; padding: 0; }
      .result-card {
        border-radius: 20px 20px 0 0; max-width: 100%;
        max-height: 92dvh; overflow-y: auto; -webkit-overflow-scrolling: touch;
        animation: sheetUp .45s cubic-bezier(0.34,1.2,0.64,1);
      }
      @keyframes sheetUp { from { transform: translateY(100%); } to { transform: none; } }
      .result-card::before {
        content: ''; display: block; width: 34px; height: 4px;
        background: var(--border); border-radius: 999px; margin: 10px auto 0;
      }
      .animal-photo { height: 190px; }
      .animal-photo-name h2 { font-size: 22px; }
      .card-body { padding: 12px 14px 14px; }
      .rescue-strip { padding: 9px 14px; }
      .card-footer { padding: 9px 14px; }
    }
    @media (max-width: 380px) {
      .pet-btn { padding: 5px 8px; font-size: 11px; }
      .header-score { display: none; }
    }

    /* News-story card styling */
    .news-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #eee;
      overflow: hidden;
      border-top-left-radius: inherit;
      border-top-right-radius: inherit;
    }
    .news-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .news-hero-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--warm), var(--amber));
    }
    .news-hero-empty {
      background: linear-gradient(135deg, var(--warm), var(--amber));
      aspect-ratio: 16 / 8;
    }
    .news-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.78) 100%);
      pointer-events: none;
    }
    .news-hero-title {
      position: absolute; left: 20px; right: 20px; bottom: 16px;
      color: white;
    }
    .news-hero-title h2 {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: 20px;
      line-height: 1.3;
      color: white;
      margin: 0 0 6px 0;
      text-wrap: pretty;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      /* Clamp to 3 lines */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-meta {
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.92);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .news-meta-dot { opacity: 0.6; }
    .status-news {
      position: absolute; top: 14px; right: 14px;
      background: var(--amber); color: var(--bark);
      font-family: 'Geist', system-ui, sans-serif;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .news-snippet {
      font-size: 14px;
      line-height: 1.65;
      color: var(--dark);
      text-wrap: pretty;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const MAP_W = 960, MAP_H = 580;

const FIPS = {
  '01':'Alabama','02':'Alaska','04':'Arizona','05':'Arkansas','06':'California',
  '08':'Colorado','09':'Connecticut','10':'Delaware','12':'Florida','13':'Georgia',
  '15':'Hawaii','16':'Idaho','17':'Illinois','18':'Indiana','19':'Iowa',
  '20':'Kansas','21':'Kentucky','22':'Louisiana','23':'Maine','24':'Maryland',
  '25':'Massachusetts','26':'Michigan','27':'Minnesota','28':'Mississippi',
  '29':'Missouri','30':'Montana','31':'Nebraska','32':'Nevada','33':'New Hampshire',
  '34':'New Jersey','35':'New Mexico','36':'New York','37':'North Carolina',
  '38':'North Dakota','39':'Ohio','40':'Oklahoma','41':'Oregon','42':'Pennsylvania',
  '44':'Rhode Island','45':'South Carolina','46':'South Dakota','47':'Tennessee',
  '48':'Texas','49':'Utah','50':'Vermont','51':'Virginia','53':'Washington',
  '54':'West Virginia','55':'Wisconsin','56':'Wyoming'
};

// Reverse lookup: state name → FIPS code (for map coloring)
const STATE_TO_FIPS = Object.fromEntries(Object.entries(FIPS).map(([k, v]) => [v, k]));

// One main city per state for fallback data
const STATE_CITIES = {
  'Alabama':'Birmingham','Alaska':'Anchorage','Arizona':'Phoenix','Arkansas':'Little Rock',
  'California':'Los Angeles','Colorado':'Denver','Connecticut':'Hartford','Delaware':'Wilmington',
  'Florida':'Tampa','Georgia':'Atlanta','Hawaii':'Honolulu','Idaho':'Boise',
  'Illinois':'Chicago','Indiana':'Indianapolis','Iowa':'Des Moines','Kansas':'Wichita',
  'Kentucky':'Louisville','Louisiana':'New Orleans','Maine':'Portland','Maryland':'Baltimore',
  'Massachusetts':'Boston','Michigan':'Detroit','Minnesota':'Minneapolis','Mississippi':'Jackson',
  'Missouri':'St. Louis','Montana':'Billings','Nebraska':'Omaha','Nevada':'Las Vegas',
  'New Hampshire':'Manchester','New Jersey':'Newark','New Mexico':'Albuquerque',
  'New York':'New York City','North Carolina':'Charlotte','North Dakota':'Fargo',
  'Ohio':'Columbus','Oklahoma':'Oklahoma City','Oregon':'Portland','Pennsylvania':'Philadelphia',
  'Rhode Island':'Providence','South Carolina':'Charleston','South Dakota':'Sioux Falls',
  'Tennessee':'Nashville','Texas':'Austin','Utah':'Salt Lake City','Vermont':'Burlington',
  'Virginia':'Richmond','Washington':'Seattle','West Virginia':'Charleston',
  'Wisconsin':'Milwaukee','Wyoming':'Cheyenne'
};

const RESCUE_PREFIXES = ['Heartland','Lone Star','Mountain','Coastal','Prairie','Valley','Sunrise','River City','Lakeside','Blue Ridge','Golden','Silver Paw','Open Arms','Second Chance'];
const RESCUE_TYPES    = ['Animal Rescue','Humane Society','Pet Rescue','Animal Shelter','Paws Rescue','Rescue League','Animal Sanctuary'];
const DOG_NAMES  = ['Biscuit','Maple','Scout','Rosie','Duke','Penny','Ginger','Bear','Hank','Luna','Coco','Buddy','Sadie','Finn','Nala'];
const CAT_NAMES  = ['Clover','Miso','Luna','Sage','Fern','Arlo','Hazel','Willow','Jasper','Fig','Pepper','Opal','Brie','Cosmo','Rue'];
const DOG_BREEDS = ['Labrador Mix','Golden Retriever Mix','Pit Bull Terrier Mix','Beagle','Border Collie Mix','Australian Shepherd Mix','Hound Mix','Shepherd Mix','Boxer Mix'];
const CAT_BREEDS = ['Domestic Shorthair','Domestic Longhair','Tabby Mix','Tuxedo Cat','Calico','Siamese Mix','Orange Tabby'];

const STORIES = [
  (name, species, city) => `${name} was found wandering near a highway and brought to us by a kind local family. They're gentle, house-trained, and great with other animals. All they need is a patient foster home to decompress and shine.`,
  (name, species, city) => `A previous owner had to surrender ${name} due to a housing move. They arrived shy but blossomed into a total sweetheart. They love cuddles and would thrive in a calm foster home in ${city}.`,
  (name, species, city) => `${name} came to us through an overcrowded rural shelter. Despite a tough start, they're playful, affectionate, and eager to learn. A loving foster in ${city} would make all the difference.`,
  (name, species, city) => `This sweet ${species} was rescued from a neglect situation in ${city}. They're now healthy and ready to experience real home life for the first time. Fully vaccinated and great with kids.`,
  (name, species, city) => `${name} is one of those rare gems — calm in the morning, playful in the evening, and always up for snuggles. They just need a temporary foster home while we find them their forever family.`,
];

function makeFallback(state, species) {
  const prefix    = RESCUE_PREFIXES[Math.floor(Math.random() * RESCUE_PREFIXES.length)];
  const type      = RESCUE_TYPES[Math.floor(Math.random() * RESCUE_TYPES.length)];
  const name      = `${prefix} ${type}`;
  const slug      = name.toLowerCase().replace(/[^a-z]/g, '');
  const city      = STATE_CITIES[state] || 'Springfield';
  const animalName = species === 'dog'
    ? DOG_NAMES[Math.floor(Math.random() * DOG_NAMES.length)]
    : CAT_NAMES[Math.floor(Math.random() * CAT_NAMES.length)];
  const breed     = species === 'dog'
    ? DOG_BREEDS[Math.floor(Math.random() * DOG_BREEDS.length)]
    : CAT_BREEDS[Math.floor(Math.random() * CAT_BREEDS.length)];
  const ageMos    = Math.floor(Math.random() * 60) + 4;
  const age       = ageMos < 12 ? `${ageMos} months` : `${Math.floor(ageMos / 12)} year${Math.floor(ageMos/12) > 1 ? 's' : ''}`;
  const storyFn   = STORIES[Math.floor(Math.random() * STORIES.length)];

  return {
    rescueName:    name,
    rescueCity:    city,
    rescueWebsite: `https://www.${slug}.org`,
    animalName,
    breed,
    age,
    sex:    Math.random() > .5 ? 'Male' : 'Female',
    status: 'Foster Needed',
    story:  storyFn(animalName, species, city),
    species,
    state,
  };
}

function lerp(a, b, t)        { return a + (b - a) * t; }
function bezier2(p0, p1, p2, t) {
  const mt = 1 - t;
  return { x: mt*mt*p0.x + 2*mt*t*p1.x + t*t*p2.x, y: mt*mt*p0.y + 2*mt*t*p1.y + t*t*p2.y };
}

// ── SVG Shapes ──
function BoneSVG({ size = 48 }) {
  return (
    <svg width={size} height={size * 0.5} viewBox="0 0 80 40" fill="none">
      <rect x="14" y="16" width="52" height="8" rx="4" fill="#5A4A42"/>
      <circle cx="14" cy="20" r="10" fill="#5A4A42"/>
      <circle cx="66" cy="20" r="10" fill="#5A4A42"/>
      <circle cx="8"  cy="13" r="6"  fill="#5A4A42"/>
      <circle cx="8"  cy="27" r="6"  fill="#5A4A42"/>
      <circle cx="72" cy="13" r="6"  fill="#5A4A42"/>
      <circle cx="72" cy="27" r="6"  fill="#5A4A42"/>
    </svg>
  );
}
function YarnSVG({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="20" fill="#D76B1A"/>
      <path d="M6 18 Q22 8 38 22"  stroke="#F7E2BD" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M5 26 Q22 36 39 22" stroke="#F7E2BD" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M14 4 Q10 22 16 40"  stroke="#F7E2BD" strokeWidth="2"   strokeLinecap="round" fill="none"/>
      <path d="M30 4 Q34 22 28 40"  stroke="#F7E2BD" strokeWidth="2"   strokeLinecap="round" fill="none"/>
    </svg>
  );
}
function TreatSVG({ size = 44 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 44 44" fill="none">
      <ellipse cx="22" cy="22" rx="16" ry="10" fill="#D76B1A" transform="rotate(-30 22 22)"/>
      <ellipse cx="22" cy="22" rx="8"  ry="5"  fill="#F7E2BD" transform="rotate(-30 22 22)"/>
      <circle cx="22" cy="22" r="3" fill="#5A4A42"/>
    </svg>
  );
}

// ── App ──
function App() {
  const [phase, setPhase]           = useState('idle');
  const [selection, setSelection]   = useState('dog');
  const [usData, setUsData]         = useState(null);
  const [projFn, setProjFn]         = useState(null);
  const [stateFeaturesRef]          = [useRef(null)];
  const [target, setTarget]         = useState(null);
  const [ripples, setRipples]       = useState([]);
  const [animalData, setAnimalData] = useState(null);
  const [photoUrl, setPhotoUrl]     = useState(null);

  // Gamification
  const [discovered, setDiscovered]       = useState({ states: new Set(), total: 0 });
  const [newStateFlash, setNewStateFlash] = useState(null);  // state name string or null
  const [scoreBump, setScoreBump]         = useState(false);

  // Draggable bone — direct DOM ref, no React re-renders during motion
  const [isResting, setIsResting]   = useState(true);
  const [isDragging, setIsDragging] = useState(false);
  const boneRef     = useRef(null);
  const boneLiveRef = useRef({ x: window.innerWidth / 2, y: window.innerHeight - 60, rot: -18, scale: 1 });

  const svgRef       = useRef();
  const mapRef       = useRef();
  const rafRef       = useRef();
  const dragRef      = useRef({ active: false, velHist: [], rot: -18 });
  const selectionRef = useRef(selection);
  selectionRef.current = selection;

  // ── Rest position ──
  const getRestPos = useCallback(() => ({
    x: window.innerWidth / 2,
    y: window.innerHeight - 60,
  }), []);

  // Direct DOM transform — zero React overhead during drag/animation
  const applyBoneTransform = useCallback((x, y, rot, scale) => {
    boneLiveRef.current = { x, y, rot, scale };
    if (boneRef.current) {
      boneRef.current.style.left      = x + 'px';
      boneRef.current.style.top       = y + 'px';
      boneRef.current.style.transform = `translate(-50%,-50%) rotate(${rot}deg) scale(${scale})`;
    }
  }, []);

  useEffect(() => {
    const pos = getRestPos();
    applyBoneTransform(pos.x, pos.y, -18, 1);
  }, []); // eslint-disable-line

  // ── Reset bone ──
  const resetBone = useCallback(() => {
    const pos = getRestPos();
    applyBoneTransform(pos.x, pos.y, -18, 1);
    setIsResting(true);
  }, [getRestPos, applyBoneTransform]);

  // ── Load US map ──
  useEffect(() => {
    d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(d => setUsData(d));
  }, []);

  // ── Render D3 map ──
  useEffect(() => {
    if (!usData || !svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('.map-layer').remove();
    const features = topojson.feature(usData, usData.objects.states).features;
    stateFeaturesRef.current = features;

    const proj = d3.geoAlbersUsa().fitSize([MAP_W, MAP_H], topojson.feature(usData, usData.objects.states));
    setProjFn(() => proj);

    const path  = d3.geoPath().projection(proj);
    const layer = svg.append('g').attr('class', 'map-layer');
    const fills = ['#F7E2BD','#F9E8C8','#F4DDB4','#FBEDCE','#F6DFB8'];

    layer.selectAll('path.st')
      .data(features).enter().append('path')
      .attr('class', 'st')
      .attr('id',    d => 'st-' + String(d.id).padStart(2,'0'))
      .attr('d',     path)
      .attr('fill',  (_, i) => fills[i % fills.length])
      .attr('stroke','#D76B1A').attr('stroke-opacity',.25).attr('stroke-width',.7);

    layer.append('path')
      .datum(topojson.mesh(usData, usData.objects.states, (a,b) => a !== b))
      .attr('d', path).attr('fill','none')
      .attr('stroke','#5A4A42').attr('stroke-opacity',.15).attr('stroke-width',.5);
  }, [usData]);

  // Highlight a visited state on the map
  const highlightState = useCallback((stateName) => {
    const fips = STATE_TO_FIPS[stateName];
    if (!fips) return;
    d3.select('#st-' + fips)
      .transition().duration(600)
      .attr('fill', '#EBBF7A');
  }, []);

  // ── Detect state from SVG coords ──
  const detectState = useCallback((svgX, svgY) => {
    if (!projFn) return 'the US';
    const inv = projFn.invert([svgX, svgY]);
    if (!inv) return 'the US';
    const feats = stateFeaturesRef.current;
    if (!feats) return 'the US';
    for (const f of feats) {
      try { if (d3.geoContains(f, inv)) return FIPS[String(f.id).padStart(2,'0')] || 'the US'; } catch {}
    }
    return 'the US';
  }, [projFn]);

  // ── Pick landing target ──
  // isDrop=true  → user just released slowly; land at release point.
  // isDrop=false → user flung it; project throw arc (capped distance).
  const pickTarget = useCallback((releaseX, releaseY, vx, vy, isDrop) => {
    if (!projFn || !mapRef.current) return null;
    const rect  = mapRef.current.getBoundingClientRect();
    const sx    = rect.width  / MAP_W;
    const sy    = rect.height / MAP_H;
    const feats = stateFeaturesRef.current;
    if (!feats) return null;

    const checkPoint = (px, py) => {
      const inv = projFn.invert([px, py]);
      if (!inv) return null;
      for (const f of feats) {
        try { if (d3.geoContains(f, inv)) return FIPS[String(f.id).padStart(2,'0')] || null; } catch {}
      }
      return null;
    };

    let natSvgX, natSvgY;

    if (isDrop) {
      natSvgX = Math.max(30, Math.min(MAP_W - 30, (releaseX - rect.left) / sx));
      natSvgY = Math.max(30, Math.min(MAP_H - 30, (releaseY - rect.top)  / sy));
    } else {
      // Cap speed so the bone can't fly too far across the map
      const speed    = Math.sqrt(vx*vx + vy*vy);
      const cappedSpd = Math.min(speed, 0.65);
      const dirX     = vx / speed;
      const dirY     = vy / speed;
      // Max arc ~220 screen px — bone stays in a reasonable neighbourhood
      const arcDist  = Math.max(80, Math.min(220, cappedSpd * 280));
      natSvgX = Math.max(40, Math.min(MAP_W - 40, ((releaseX + dirX * arcDist) - rect.left) / sx));
      natSvgY = Math.max(40, Math.min(MAP_H - 40, ((releaseY + dirY * arcDist) - rect.top)  / sy));
    }

    const directState = checkPoint(natSvgX, natSvgY);
    if (directState) {
      return { svgX: natSvgX, svgY: natSvgY, screenX: rect.left + natSvgX * sx, screenY: rect.top + natSvgY * sy, state: directState };
    }

    // Off-land: spiral outward to find nearest state
    let best = null, bestDist = Infinity;
    for (let i = 0; i < 220; i++) {
      const angle  = (i / 220) * Math.PI * 14;
      const radius = (i / 220) * 220 + 10;
      const px = natSvgX + Math.cos(angle) * radius;
      const py = natSvgY + Math.sin(angle) * radius;
      if (px < 40 || px > MAP_W-40 || py < 40 || py > MAP_H-40) continue;
      const state = checkPoint(px, py);
      if (state) {
        const d = Math.sqrt((px-natSvgX)**2 + (py-natSvgY)**2);
        if (d < bestDist) { bestDist = d; best = { px, py, state }; }
        if (bestDist < 30) break;
      }
    }
    if (best) {
      return { svgX: best.px, svgY: best.py, screenX: rect.left + best.px * sx, screenY: rect.top + best.py * sy, state: best.state };
    }
    return null;
  }, [projFn]);

  // ── Drag handlers ──
  const startDrag = useCallback((clientX, clientY) => {
    if (phase !== 'idle') return;
    dragRef.current = {
      active:  true,
      velHist: [{ x: clientX, y: clientY, t: performance.now() }],
      rot:     boneLiveRef.current.rot,
    };
    setIsDragging(true);
    setIsResting(false);
  }, [phase]);

  const moveDrag = useCallback((clientX, clientY) => {
    if (!dragRef.current.active) return;
    const hist = dragRef.current.velHist;
    hist.push({ x: clientX, y: clientY, t: performance.now() });
    if (hist.length > 8) hist.shift();
    dragRef.current.rot += 4;
    applyBoneTransform(clientX, clientY, dragRef.current.rot, 1);
  }, [applyBoneTransform]);

  const endDrag = useCallback((clientX, clientY) => {
    if (!dragRef.current.active) return;
    dragRef.current.active = false;
    setIsDragging(false);

    const hist   = dragRef.current.velHist;
    let vx = 0, vy = 0;
    const recent = hist.length >= 4 ? hist.slice(-4) : hist;
    if (recent.length >= 2) {
      const a  = recent[0], b = recent[recent.length - 1];
      const dt = Math.max(b.t - a.t, 1);
      vx = (b.x - a.x) / dt;
      vy = (b.y - a.y) / dt;
    }

    const speed  = Math.sqrt(vx*vx + vy*vy);
    const isDrop = speed < 0.12;

    const tgt = pickTarget(clientX, clientY, vx, vy, isDrop);
    if (!tgt) { resetBone(); return; }

    setTarget(tgt);
    setPhase('throwing');
    setRipples([]);

    const startPos  = { x: clientX, y: clientY };
    const endPos    = { x: tgt.screenX, y: tgt.screenY };
    const startRot  = dragRef.current.rot;
    const DURATION  = isDrop ? 380 : Math.max(500, Math.min(900, 850 - speed * 80));
    const ctrlPos   = isDrop
      ? { x: (startPos.x + endPos.x) / 2, y: Math.min(startPos.y, endPos.y) - 50 }
      : { x: startPos.x + vx * DURATION * 0.35, y: startPos.y + vy * DURATION * 0.35 };

    const t0 = performance.now();

    function animate(now) {
      const raw   = Math.min((now - t0) / DURATION, 1);
      const pos   = bezier2(startPos, ctrlPos, endPos, raw);
      const scale = isDrop ? lerp(1, 0.5, raw) : lerp(1.15, 0.4, raw);
      const rot   = startRot + raw * (isDrop ? 120 : 480);
      applyBoneTransform(pos.x, pos.y, rot, scale);

      if (raw < 1) {
        rafRef.current = requestAnimationFrame(animate);
      } else {
        setPhase('landing');
        setRipples([{ id: Date.now(), x: tgt.svgX, y: tgt.svgY }]);
        setTimeout(() => {
          setPhase('loading');
          loadAnimal(tgt, selectionRef.current);
        }, 800);
      }
    }
    rafRef.current = requestAnimationFrame(animate);
  }, [pickTarget, resetBone, applyBoneTransform]);

  useEffect(() => () => cancelAnimationFrame(rafRef.current), []);

  // Global pointer listeners
  useEffect(() => {
    const onMove = e => {
      if (!dragRef.current.active) return;
      e.preventDefault(); // prevent scroll during drag
      const pt = e.touches ? e.touches[0] : e;
      moveDrag(pt.clientX, pt.clientY);
    };
    const onUp = e => {
      const pt = e.changedTouches ? e.changedTouches[0] : e;
      endDrag(pt.clientX, pt.clientY);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup',   onUp);
    window.addEventListener('touchmove', onMove, { passive: false }); // passive:false so we can preventDefault
    window.addEventListener('touchend',  onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup',   onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend',  onUp);
    };
  }, [moveDrag, endDrag]);

  // ── Zoom map on landing ──
  useEffect(() => {
    if ((phase === 'loading' || phase === 'result') && target && svgRef.current) {
      const ox = (target.svgX / MAP_W) * 100;
      const oy = (target.svgY / MAP_H) * 100;
      svgRef.current.style.transformOrigin = `${ox}% ${oy}%`;
      svgRef.current.style.transform       = 'scale(3.8)';
    }
  }, [phase, target]);

  // ── Load rescue news story ──
  const loadAnimal = async (tgt, sel) => {
    setPhotoUrl(null);
    let data;
    try {
      const r = await fetch(`/api/rescue-news?state=${encodeURIComponent(tgt.state)}`);
      const j = await r.json();
      if (j && j.ok && j.story) {
        data = {
          isNews: true,
          state: tgt.state,
          headline: j.story.headline || '',
          snippet: j.story.snippet || '',
          source: j.story.source || '',
          date: j.story.date || null,
          url: j.story.url || '',
          image: j.story.image || null,
        };
        if (j.story.image) setPhotoUrl(j.story.image);
      } else {
        data = { isNews: false, noStory: true, state: tgt.state };
      }
    } catch {
      data = { isNews: false, noStory: true, state: tgt.state };
    }
    setAnimalData(data);

    // ── Update gamification ──
    const isNewState = !discovered.states.has(tgt.state);
    setDiscovered(prev => ({
      states: new Set([...prev.states, tgt.state]),
      total:  prev.total + 1,
    }));
    // Animate score pill
    setScoreBump(true);
    setTimeout(() => setScoreBump(false), 400);
    // Highlight visited state on map
    highlightState(tgt.state);
    // Flash new-state toast
    if (isNewState) {
      setNewStateFlash(tgt.state);
      setTimeout(() => setNewStateFlash(null), 1800);
    }

    setPhase('result');
  };

  const handleAgain = () => {
    const pos = getRestPos();
    boneLiveRef.current = { x: pos.x, y: pos.y, rot: -18, scale: 1 };
    setPhase('idle');
    setAnimalData(null);
    setPhotoUrl(null);
    setTarget(null);
    setRipples([]);
    if (svgRef.current) { svgRef.current.style.transform = ''; svgRef.current.style.transformOrigin = ''; }
    setTimeout(resetBone, 50);
  };

  const toyLabel  = selection === 'cat' ? 'toy' : selection === 'both' ? 'treat' : 'bone';
  const showBone  = phase === 'idle' || phase === 'throwing' || phase === 'landing';
  const hasPlayed = discovered.total > 0;

  return (
    <div className="app">
      {/* Header */}
      <header className="header">
        <div className="header-logo">

          <span className="header-tagline">rescue animal finder</span>
        </div>

        {/* Gamification counter */}
        {hasPlayed && (
          <div className="header-score">
            <span className={`score-pill${scoreBump ? ' bump' : ''}`}>
              🐾 {discovered.total} found
            </span>
            <span className={`score-pill${scoreBump ? ' bump' : ''}`}>
              🗺 {discovered.states.size} state{discovered.states.size !== 1 ? 's' : ''}
            </span>
          </div>
        )}

        <a href="https://getsecondtail.com/for-fosters" target="_blank" className="header-link">Become a foster →</a>
      </header>

      {/* Map */}
      <div className="map-wrapper" ref={mapRef}>
        <div className="map-svg-container">
          <svg ref={svgRef} viewBox={`0 0 ${MAP_W} ${MAP_H}`} preserveAspectRatio="xMidYMid meet">
            {ripples.map(r => (
              <g key={r.id} className="ripple-ring">
                <circle cx={r.x} cy={r.y} r="2" fill="rgba(215,107,26,0.55)">
                  <animate attributeName="r" from="2" to="32" dur=".85s" fill="freeze"/>
                  <animate attributeName="fill-opacity" from=".55" to="0" dur=".85s" fill="freeze"/>
                </circle>
                <circle cx={r.x} cy={r.y} r="2" fill="rgba(215,107,26,0.3)">
                  <animate attributeName="r" from="2" to="55" dur="1.1s" fill="freeze"/>
                  <animate attributeName="fill-opacity" from=".3" to="0" dur="1.1s" fill="freeze"/>
                </circle>
              </g>
            ))}

            {(phase === 'loading' || phase === 'result') && target && (
              <g transform={`translate(${target.svgX},${target.svgY})`}>
                <ellipse cx="0" cy="2" rx="5" ry="2" fill="rgba(0,0,0,0.2)"/>
                <path d="M0,-24 C-8,-24 -13,-17 -13,-11 C-13,0 0,11 0,11 C0,11 13,0 13,-11 C13,-17 8,-24 0,-24Z" fill="#D76B1A"/>
                <circle cx="0" cy="-11" r="4.5" fill="white"/>
              </g>
            )}
          </svg>
        </div>

        {/* Intro text */}
        {phase === 'idle' && (
          <div className="map-intro">
            <h1>Grab the {toyLabel} —<br/>find a rescue.</h1>
            <p>Fling it onto the map. See real rescue stories happening there now.</p>
          </div>
        )}

        {/* New-state toast */}
        {newStateFlash && (
          <div className="new-state-toast">✨ New! {newStateFlash}</div>
        )}

        {phase === 'loading' && (
          <div className="loading-overlay">
            <div className="spinner"/>
            <div className="loading-text">Sniffing out a rescue in {target?.state}…</div>
          </div>
        )}

        {phase === 'result' && animalData && (
          <ResultCard data={animalData} photoUrl={photoUrl} onAgain={handleAgain}/>
        )}
      </div>

      {/* Bone */}
      {showBone && (
        <div
          ref={boneRef}
          className={`throw-item${isResting ? ' resting' : ''}${isDragging ? ' dragging' : ''}`}
          style={{
            left:      boneLiveRef.current.x,
            top:       boneLiveRef.current.y,
            transform: `translate(-50%,-50%) rotate(${boneLiveRef.current.rot}deg) scale(${boneLiveRef.current.scale})`,
          }}
          onMouseDown={e => { e.preventDefault(); startDrag(e.clientX, e.clientY); }}
          onTouchStart={e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }}
        >
          {selection === 'cat'  ? <YarnSVG  size={48}/> :
           selection === 'both' ? <TreatSVG size={48}/> :
                                  <BoneSVG  size={56}/>}
        </div>
      )}

      {/* Bottom bar */}
      <div className="bottom-ui">
        <div className="bottom-prompt">
          {phase === 'idle'
            ? <><em>Grab &amp; fling</em> the {toyLabel} onto the map<small>Drop it gently or throw it fast</small></>
            : phase === 'throwing' || phase === 'landing'
            ? <><em>In the air…</em> let's see where it lands</>
            : phase === 'loading'
            ? <><em>Found a spot</em> in {target?.state} — fetching an animal…</>
            : <><em>Throw again</em> to find another rescue</>}
        </div>
        <div className="pet-selector">
          {[['dog','🦴 Dogs'],['cat','🐾 Cats'],['both','Both']].map(([v, lbl]) => (
            <button
              key={v}
              className={`pet-btn${selection === v ? ' active' : ''}`}
              onClick={() => { if (phase === 'idle') { setSelection(v); resetBone(); } }}
              disabled={phase !== 'idle'}
            >{lbl}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Result Card ──
function ResultCard({ data, photoUrl, onAgain }) {
  const fosterCTA = 'https://getsecondtail.com/for-fosters';

  // No-story fallback card
  if (data.noStory) {
    return (
      <div className="result-overlay">
        <div className="result-card">
          <div className="news-hero news-hero-empty">
            <div className="news-hero-overlay"/>
            <div className="news-hero-title">
              <h2>Second Tail is coming to {data.state}</h2>
              <div className="news-meta">No rescue headlines this week</div>
            </div>
          </div>
          <div className="card-body">
            <div className="news-snippet">
              We couldn't find a recent rescue news story for {data.state} — but rescues in every state need fosters right now. Sign up and we'll match you with one when Second Tail launches in your area.
            </div>
            <a href={fosterCTA} target="_blank" className="btn-foster">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              Sign up to foster with Second Tail
            </a>
          </div>
          <div className="card-footer">
            <button className="again-btn" onClick={onAgain}>↺ Throw again</button>
            <span className="footer-brand">Powered by Second Tail</span>
          </div>
        </div>
      </div>
    );
  }

  // Format date: "Apr 18, 2026" or "3 days ago"
  let dateLabel = '';
  if (data.date) {
    const d = new Date(data.date);
    if (!isNaN(d.getTime())) {
      const diffMs = Date.now() - d.getTime();
      const diffDays = Math.floor(diffMs / 86400000);
      if (diffDays < 1) dateLabel = 'Today';
      else if (diffDays === 1) dateLabel = 'Yesterday';
      else if (diffDays < 30) dateLabel = `${diffDays} days ago`;
      else dateLabel = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
  }

  const sourceLabel = data.source
    ? data.source.replace(/^www\./, '')
    : '';

  return (
    <div className="result-overlay">
      <div className="result-card">
        {/* Hero image + headline */}
        <div className="news-hero">
          {photoUrl
            ? <img src={photoUrl} alt="" onError={e => { e.target.style.display='none'; }}/>
            : <div className="news-hero-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#D76B1A" strokeWidth="1.5">
                  <path d="M4 4h16v16H4z M4 16l4-4 4 4 4-4 4 4"/>
                  <circle cx="9" cy="9" r="1.5" fill="#D76B1A"/>
                </svg>
              </div>
          }
          <div className="news-hero-overlay"/>
          <div className="news-hero-title">
            <h2>{data.headline}</h2>
            <div className="news-meta">
              {sourceLabel && <span>{sourceLabel}</span>}
              {sourceLabel && dateLabel && <span className="news-meta-dot">·</span>}
              {dateLabel && <span>{dateLabel}</span>}
              <span className="news-meta-dot">·</span>
              <span>{data.state}</span>
            </div>
          </div>
          <div className="status-pill status-news">Rescue news</div>
        </div>

        {/* Body */}
        <div className="card-body">
          {data.snippet && (
            <div className="news-snippet">{data.snippet}</div>
          )}

          {/* Primary CTA — solid orange */}
          <a
            href={fosterCTA}
            target="_blank"
            className="btn-foster"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            Sign up to foster with Second Tail
          </a>

          {/* Secondary — read full story */}
          {data.url && (
            <a href={data.url} target="_blank" rel="noopener noreferrer" className="btn-rescue">
              Read full story →
            </a>
          )}
        </div>

        <div className="card-footer">
          <button className="again-btn" onClick={onAgain}>↺ Throw again</button>
          <span className="footer-brand">Powered by Second Tail</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
